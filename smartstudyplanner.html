<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumino — Smart Study Planner</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'Segoe UI',system-ui,sans-serif}
body{background:#0F0D1E;color:#E8E2FF}
@keyframes orbPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2E2750;border-radius:10px}
select option{background:#241E42;color:#F0EEFF}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

const MOODS=[
  {id:"focused",label:"Focused",emoji:"🎯",color:"#a78bfa",glow:"rgba(167,139,250,0.25)"},
  {id:"energized",label:"Energized",emoji:"⚡",color:"#34d399",glow:"rgba(52,211,153,0.25)"},
  {id:"tired",label:"Tired",emoji:"😴",color:"#93c5fd",glow:"rgba(147,197,253,0.2)"},
  {id:"anxious",label:"Anxious",emoji:"😟",color:"#fcd34d",glow:"rgba(252,211,77,0.2)"},
  {id:"motivated",label:"Motivated",emoji:"🔥",color:"#fb923c",glow:"rgba(251,146,60,0.25)"},
  {id:"calm",label:"Calm",emoji:"🌿",color:"#86efac",glow:"rgba(134,239,172,0.2)"},
  {id:"stressed",label:"Stressed",emoji:"😤",color:"#fca5a5",glow:"rgba(252,165,165,0.2)"},
  {id:"happy",label:"Happy",emoji:"😊",color:"#f9a8d4",glow:"rgba(249,168,212,0.25)"},
];

const INSIGHTS={
  focused:"Peak focus detected — tackle your hardest material now. Deep work blocks of 90 min are ideal.",
  energized:"High energy! Use active recall and timed quizzes to capitalise on this state.",
  tired:"Low energy noted. Stick to light flashcard review; skip complex new topics for now.",
  anxious:"Try 5 min of box breathing first, then break tasks into very small, concrete steps.",
  motivated:"Motivation is high — set stretch targets today. You're more resilient to difficulty right now.",
  calm:"Steady state — ideal for absorbing new material, annotating notes, and slow reading.",
  stressed:"Take a 10-min walk to lower cortisol, then work on familiar material for small wins.",
  happy:"Positive mood boosts creativity — great day for essays, brainstorming, and writing.",
};

const AI_TIPS={
  focused:["🧠 Deep work: silence notifications for 90-min blocks to reach flow.","🔁 Space repetition: review notes 24 hrs later for 60% better retention.","💧 Hydration boosts cognition by up to 14% — keep water at your desk."],
  energized:["⚡ Channel energy into active recall — quiz yourself, don't just reread.","🏃 Short 2-min movement breaks every 45 min prevent burnout.","📊 Timed practice exams work best when energy is this high."],
  tired:["😴 The 20-min power nap before studying can restore alertness.","🃏 Flashcard review is low-effort and still highly effective.","☕ Caffeine peaks 45 min after drinking — plan your session timing."],
  anxious:["🌬️ Box breathing (4-4-4-4) reduces cortisol before you start.","✅ Write 3 tiny tasks you can finish in 10 min — then do them.","📓 Journaling worries for 5 min clears mental space for studying."],
  motivated:["🎯 Set a stretch goal — you're resilient to setbacks right now.","📈 Tackle your hardest subject first while motivation is at peak.","🏆 Logging what you finish reinforces positive motivation loops."],
  calm:["📖 Perfect state for deep reading and absorbing new concepts.","🔬 Review lecture notes and annotate them in your own words.","🎵 Low-tempo instrumental music helps maintain calm focus."],
  stressed:["🌿 A 10-min walk lowers cortisol and improves working memory.","🧩 Work on familiar material for small wins that reduce stress.","📵 Phone-free blocks eliminate a major source of cognitive load."],
  happy:["✍️ Creative thinking is enhanced — ideal for essay drafts.","🤝 Study with a peer today — positive mood boosts group focus.","🌟 Positive affect improves long-term memory encoding."],
};

const INIT_SESSIONS=[
  {id:1,time:"08:00",dur:"90 min",subject:"Mathematics",topic:"Calculus — Differential Equations",diff:"hard",ai:true,done:true},
  {id:2,time:"10:00",dur:"60 min",subject:"Physics",topic:"Electromagnetism — Faraday's Law",diff:"hard",ai:true,done:true},
  {id:3,time:"11:30",dur:"45 min",subject:"Chemistry",topic:"Organic — Reaction Mechanisms",diff:"medium",ai:false,done:false},
  {id:4,time:"14:00",dur:"60 min",subject:"English",topic:"Essay Writing — Argumentative Structure",diff:"easy",ai:false,done:false},
  {id:5,time:"16:00",dur:"90 min",subject:"Mathematics",topic:"Practice Problems — Revision Set 3",diff:"medium",ai:true,done:false},
];

const SUBJECTS=[{name:"Mathematics",pct:68},{name:"Physics",pct:52},{name:"Chemistry",pct:41},{name:"English",pct:79}];
const DIFF_COLORS={hard:{bg:"rgba(252,165,165,0.12)",color:"#fca5a5"},medium:{bg:"rgba(252,211,77,0.12)",color:"#fcd34d"},easy:{bg:"rgba(110,231,183,0.12)",color:"#6ee7b7"}};

const now=new Date();
const DATE_STR=now.toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

function App(){
  const [mood,setMood]=useState("focused");
  const [sessions,setSessions]=useState(INIT_SESSIONS);
  const [nextId,setNextId]=useState(6);
  const [showAdd,setShowAdd]=useState(false);
  const [toast,setToast]=useState(null);
  const [activeNav,setActiveNav]=useState("Dashboard");
  const [form,setForm]=useState({subject:"",topic:"",time:"09:00",dur:"60 min",diff:"medium"});
  const [aiLoading,setAiLoading]=useState(false);
  const [aiResponse,setAiResponse]=useState("");
  const [showAiModal,setShowAiModal]=useState(false);
  const toastTimer=useRef(null);
  const cm=MOODS.find(m=>m.id===mood);
  const done=sessions.filter(s=>s.done).length;

  function showT(msg){clearTimeout(toastTimer.current);setToast(msg);toastTimer.current=setTimeout(()=>setToast(null),2800);}
  function toggleDone(id){setSessions(p=>p.map(s=>s.id===id?{...s,done:!s.done}:s));const s=sessions.find(s=>s.id===id);showT(s?.done?"Session reopened":"Session complete ✓");}
  
  function addSession(){
    if(!form.subject.trim()){showT("⚠ Please enter a subject");return;}
    setSessions(p=>[...p,{id:nextId,time:form.time,dur:form.dur,subject:form.subject,topic:form.topic||"General Study",diff:form.diff,ai:false,done:false}].sort((a,b)=>a.time.localeCompare(b.time)));
    setNextId(n=>n+1);
    setForm({subject:"",topic:"",time:"09:00",dur:"60 min",diff:"medium"});
    setShowAdd(false);
    showT(`✦ ${form.subject} session added!`);
  }

  async function genPlan(){
    setAiLoading(true);setShowAiModal(true);setAiResponse("");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:1000,
          messages:[{role:"user",content:`You are a smart study planner AI. The student's current mood is "${mood}". Their sessions today: ${sessions.map(s=>`${s.time} - ${s.subject} (${s.topic}, ${s.dur}, ${s.diff})`).join("; ")}. Give a personalized 3-paragraph study plan recommendation covering: how their "${mood}" mood affects learning today, specific session prioritisation advice, and a motivational insight. Under 220 words. Warm and practical tone.`}]
        })
      });
      const data=await res.json();
      setAiResponse(data.content?.map(b=>b.text||"").join("")||"Could not generate plan.");
    }catch(e){
      setAiResponse("Could not connect to AI. Make sure you have internet access and try again.");
    }
    setAiLoading(false);
  }

  const navItems=[
    {l:"Dashboard",e:"⊞"},{l:"Schedule",e:"📅"},{l:"Tasks",e:"✓"},{l:"Analytics",e:"📈"},
    {l:"Focus Timer",e:"⏱"},{l:"Mood History",e:"🌙"},
  ];

  const S={
    app:{display:"flex",minHeight:"100vh",background:"#0F0D1E",color:"#E8E2FF"},
    sidebar:{width:210,minHeight:"100vh",background:"#1A1535",borderRight:"1px solid #2E2750",display:"flex",flexDirection:"column",padding:"26px 15px",position:"sticky",top:0,height:"100vh",flexShrink:0},
    main:{flex:1,padding:"32px 36px",overflowY:"auto",maxHeight:"100vh"},
    logo:{fontFamily:"system-ui",fontSize:22,fontWeight:800,color:"#F0EEFF",marginBottom:3,letterSpacing:-0.5},
    logoSub:{fontSize:10,color:"#8B80B8",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:26},
    navLabel:{fontSize:10,color:"#8B80B8",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6,marginTop:18,paddingLeft:10},
    navItem:(a)=>({display:"flex",alignItems:"center",gap:8,padding:"9px 12px",borderRadius:9,cursor:"pointer",fontSize:13,color:a?"#C4B5FD":"#8B80B8",background:a?"#241E42":"transparent",marginBottom:2,fontWeight:500,transition:"all 0.15s"}),
    card:{background:"#1A1535",border:"1px solid #2E2750",borderRadius:14,padding:"18px 20px"},
    btn:(primary)=>({padding:"9px 16px",borderRadius:9,fontSize:12,fontWeight:600,cursor:"pointer",border:primary?"none":"1px solid #2E2750",background:primary?"linear-gradient(135deg,#7C6FBB,#C4B5FD)":"#1A1535",color:primary?"#0F0D1E":"#8B80B8",fontFamily:"inherit",transition:"all 0.15s"}),
    inputF:{width:"100%",background:"#241E42",border:"1px solid #2E2750",borderRadius:9,padding:"9px 12px",fontFamily:"inherit",fontSize:13,color:"#F0EEFF",outline:"none",boxSizing:"border-box"},
    label:{fontSize:10,color:"#8B80B8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5,display:"block"},
  };

  return (
    <div style={S.app}>
      {/* SIDEBAR */}
      <aside style={S.sidebar}>
        <div style={S.logo}>Lumin<span style={{color:"#C4B5FD"}}>o</span></div>
        <div style={S.logoSub}>Study Intelligence</div>

        <div style={S.navLabel}>Menu</div>
        {navItems.slice(0,4).map(n=>(
          <div key={n.l} style={S.navItem(activeNav===n.l)} onClick={()=>setActiveNav(n.l)}>
            <span>{n.e}</span>{n.l}
          </div>
        ))}

        <div style={S.navLabel}>Tools</div>
        {navItems.slice(4).map(n=>(
          <div key={n.l} style={S.navItem(activeNav===n.l)} onClick={()=>setActiveNav(n.l)}>
            <span>{n.e}</span>{n.l}
          </div>
        ))}

        <div style={{marginTop:"auto",paddingTop:16,borderTop:"1px solid #2E2750"}}>
          <div style={{fontSize:10,color:"#8B80B8",lineHeight:1.6,textAlign:"center"}}>
            <div style={{color:"#C4B5FD",fontWeight:600,marginBottom:2}}>Made by</div>
            <div style={{color:"#E8E2FF",fontWeight:500}}>Trinabh Saxena</div>
            <div style={{color:"#8B80B8"}}>&amp;</div>
            <div style={{color:"#E8E2FF",fontWeight:500}}>Mohit Tomar</div>
          </div>
        </div>
      </aside>

      {/* MAIN */}
      <main style={S.main}>

        {/* HEADER */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
          <div>
            <div style={{fontFamily:"system-ui",fontSize:26,fontWeight:800,color:"#F0EEFF",letterSpacing:-0.5}}>Today's Study Plan</div>
            <div style={{fontSize:12,color:"#8B80B8",marginTop:4}}>{DATE_STR}</div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button style={S.btn(false)} onClick={genPlan}>✦ AI Generate Plan</button>
            <button style={S.btn(true)} onClick={()=>setShowAdd(v=>!v)}>+ Add Session</button>
          </div>
        </div>

        {/* MOOD SECTION */}
        <div style={{...S.card,display:"flex",gap:32,alignItems:"center",marginBottom:22,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-50,right:-50,width:200,height:200,background:cm.glow,borderRadius:"50%",filter:"blur(55px)",pointerEvents:"none",transition:"background 1s"}}/>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,flexShrink:0}}>
            <div style={{width:74,height:74,borderRadius:"50%",background:cm.color,boxShadow:`0 0 28px ${cm.glow},0 0 56px ${cm.glow}`,animation:"orbPulse 3s ease-in-out infinite"}}/>
            <div style={{fontSize:10,color:"#8B80B8",textTransform:"uppercase",letterSpacing:"0.08em"}}>Current Mood</div>
            <div style={{fontSize:13,fontWeight:700,color:cm.color,transition:"color 0.8s"}}>{cm.label}</div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"system-ui",fontSize:16,fontWeight:700,color:"#F0EEFF",marginBottom:4}}>How are you feeling right now?</div>
            <div style={{fontSize:12,color:"#8B80B8",marginBottom:16}}>AI adapts your plan based on mood for better learning outcomes.</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {MOODS.map(m=>(
                <div key={m.id}
                  style={{padding:"7px 14px",borderRadius:100,fontSize:12,fontWeight:600,cursor:"pointer",border:`1.5px solid ${mood===m.id?m.color:"#2E2750"}`,background:mood===m.id?`${m.color}25`:"#241E42",color:mood===m.id?m.color:"#8B80B8",display:"flex",alignItems:"center",gap:6,transition:"all 0.2s",userSelect:"none"}}
                  onClick={()=>{setMood(m.id);showT(`Mood: ${m.label} — plan adapting`);}}>
                  {m.emoji} {m.label}
                </div>
              ))}
            </div>
            <div style={{marginTop:16,padding:"11px 14px",background:"#241E42",borderLeft:`3px solid ${cm.color}`,borderRadius:"0 8px 8px 0",fontSize:12,color:"#8B80B8",lineHeight:1.6}}>
              <span style={{color:cm.color}}>✦ </span>{INSIGHTS[mood]}
            </div>
          </div>
        </div>

        {/* STATS */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:22}}>
          {[
            {l:"Study Streak",v:"12",s:" days",d:"↑ Personal best"},
            {l:"Hours Today",v:"3.5",s:" hrs",d:"↑ 0.5 hrs vs avg"},
            {l:"Sessions Done",v:`${done}`,s:` / ${sessions.length}`,d:"On track"},
            {l:"Focus Score",v:"84",s:" %",d:"↑ 6% vs yesterday"},
          ].map(({l,v,s,d})=>(
            <div key={l} style={S.card}>
              <div style={{fontSize:10,color:"#8B80B8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>{l}</div>
              <div style={{fontFamily:"system-ui",fontSize:24,fontWeight:800,color:"#F0EEFF",letterSpacing:-0.5}}>
                {v}<span style={{fontSize:13,fontWeight:400,color:"#8B80B8",letterSpacing:0}}>{s}</span>
              </div>
              <div style={{fontSize:11,color:"#6EE7B7",marginTop:4}}>{d}</div>
            </div>
          ))}
        </div>

        {/* PLANNER GRID */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:20}}>

          {/* SESSIONS */}
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:"#F0EEFF"}}>Today's Sessions</div>
              <div style={{fontSize:11,background:"#241E42",border:"1px solid #2E2750",color:"#8B80B8",padding:"3px 10px",borderRadius:100}}>{sessions.length} sessions planned</div>
            </div>

            {/* ADD FORM */}
            {showAdd&&(
              <div style={{...S.card,marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:"#F0EEFF"}}>New Session</div>
                  <button style={{...S.btn(false),padding:"5px 10px"}} onClick={()=>setShowAdd(false)}>✕</button>
                </div>
                {[{l:"Subject",k:"subject",ph:"e.g. Mathematics"},{l:"Topic",k:"topic",ph:"e.g. Calculus – Integration"}].map(f=>(
                  <div key={f.k} style={{marginBottom:12}}>
                    <label style={S.label}>{f.l}</label>
                    <input style={S.inputF} placeholder={f.ph} value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))}/>
                  </div>
                ))}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                  <div>
                    <label style={S.label}>Start Time</label>
                    <input type="time" style={S.inputF} value={form.time} onChange={e=>setForm(p=>({...p,time:e.target.value}))}/>
                  </div>
                  <div>
                    <label style={S.label}>Duration</label>
                    <select style={S.inputF} value={form.dur} onChange={e=>setForm(p=>({...p,dur:e.target.value}))}>
                      {["25 min","45 min","60 min","90 min","120 min"].map(d=><option key={d}>{d}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{marginBottom:14}}>
                  <label style={S.label}>Difficulty</label>
                  <select style={S.inputF} value={form.diff} onChange={e=>setForm(p=>({...p,diff:e.target.value}))}>
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                  </select>
                </div>
                <button style={{...S.btn(true),width:"100%"}} onClick={addSession}>Add Session</button>
              </div>
            )}

            {/* SESSION CARDS */}
            {sessions.map(session=>(
              <div key={session.id} style={{...S.card,display:"flex",alignItems:"center",gap:14,marginBottom:10,position:"relative"}}>
                {session.ai&&<div style={{position:"absolute",top:9,right:12,fontSize:10,padding:"2px 8px",borderRadius:100,fontWeight:600,background:"rgba(245,158,11,0.12)",color:"#F59E0B",border:"1px solid rgba(245,158,11,0.3)"}}>AI Pick</div>}
                <div style={{flexShrink:0,width:50,textAlign:"center"}}>
                  <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:700,color:"#C4B5FD"}}>{session.time}</div>
                  <div style={{fontSize:10,color:"#8B80B8",marginTop:2}}>{session.dur}</div>
                </div>
                <div style={{width:1,height:36,background:"#2E2750",flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,color:"#F0EEFF",marginBottom:2}}>{session.subject}</div>
                  <div style={{fontSize:11,color:"#8B80B8"}}>{session.topic}</div>
                  <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
                    <span style={{fontSize:10,padding:"2px 8px",borderRadius:100,fontWeight:600,...DIFF_COLORS[session.diff]}}>{session.diff}</span>
                    {session.ai&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:100,fontWeight:600,background:"rgba(196,181,253,0.12)",color:"#C4B5FD"}}>AI Optimized</span>}
                  </div>
                </div>
                <div
                  style={{width:28,height:28,borderRadius:"50%",border:`1.5px solid ${session.done?cm.color:"#2E2750"}`,background:session.done?cm.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,color:session.done?"#0F0D1E":"transparent",fontSize:12,fontWeight:700,transition:"all 0.2s"}}
                  onClick={()=>toggleDone(session.id)}>
                  {session.done?"✓":""}
                </div>
              </div>
            ))}
          </div>

          {/* RIGHT PANEL */}
          <div>
            {/* AI TIPS */}
            <div style={{...S.card,marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:14}}>
                <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,#C4B5FD,#F59E0B)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>✦</div>
                <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:"#F0EEFF"}}>AI Recommendations</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {AI_TIPS[mood].map((tip,i)=>(
                  <div key={i} style={{display:"flex",gap:10,padding:"10px 12px",background:"#241E42",borderRadius:9,fontSize:12,color:"#8B80B8",lineHeight:1.5,alignItems:"flex-start"}}>
                    <span style={{fontSize:15,flexShrink:0,lineHeight:1.3}}>{tip.slice(0,2)}</span>
                    <span>{tip.slice(3)}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* SUBJECT PROGRESS */}
            <div style={S.card}>
              <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:"#F0EEFF",marginBottom:16}}>Subject Progress</div>
              {SUBJECTS.map(sub=>(
                <div key={sub.name} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5}}>
                    <span style={{color:"#E8E2FF",fontWeight:500}}>{sub.name}</span>
                    <span style={{color:"#8B80B8"}}>{sub.pct}%</span>
                  </div>
                  <div style={{height:5,background:"#241E42",borderRadius:100,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:100,background:`linear-gradient(90deg,${cm.color},#F59E0B)`,width:`${sub.pct}%`,transition:"width 0.8s ease"}}/>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* AI MODAL */}
        {showAiModal&&(
          <div style={{position:"fixed",inset:0,background:"rgba(10,8,20,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={e=>{if(e.target===e.currentTarget)setShowAiModal(false);}}>
            <div style={{background:"#1A1535",border:"1px solid #2E2750",borderRadius:16,padding:28,maxWidth:520,width:"90%",maxHeight:"80vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,#C4B5FD,#F59E0B)",display:"flex",alignItems:"center",justifyContent:"center"}}>✦</div>
                  <div style={{fontFamily:"system-ui",fontSize:16,fontWeight:700,color:"#F0EEFF"}}>AI Study Plan</div>
                </div>
                <button style={{...S.btn(false),padding:"5px 10px"}} onClick={()=>setShowAiModal(false)}>✕</button>
              </div>
              <div style={{fontSize:12,color:"#8B80B8",marginBottom:14}}>
                Mood: <span style={{color:cm.color,fontWeight:600}}>{cm.emoji} {cm.label}</span>
              </div>
              {aiLoading?(
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {[100,80,65,50].map((w,i)=>(
                    <div key={i} style={{height:12,width:`${w}%`,background:"linear-gradient(90deg,#241E42 25%,#2E2750 50%,#241E42 75%)",backgroundSize:"200% 100%",animation:"shimmer 1.5s infinite",borderRadius:6}}/>
                  ))}
                  <div style={{textAlign:"center",color:"#8B80B8",fontSize:12,marginTop:8}}>AI is analysing your plan…</div>
                </div>
              ):(
                <div style={{fontSize:13,color:"#C4B5FD",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{aiResponse}</div>
              )}
            </div>
          </div>
        )}

        {/* TOAST */}
        {toast&&(
          <div style={{position:"fixed",bottom:24,right:24,background:"#1A1535",border:"1px solid #7C6FBB",borderRadius:10,padding:"12px 18px",fontSize:13,color:"#F0EEFF",zIndex:200,boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
            {toast}
          </div>
        )}

      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
